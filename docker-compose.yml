services:

  # ─────────────────────────────────────────────
  # REMOTE ACCESS
  # ─────────────────────────────────────────────

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: ugreen-nas
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # DNS / AD-BLOCKING
  # ─────────────────────────────────────────────

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    network_mode: host
    environment:
      - TZ=${TZ}
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - PIHOLE_DNS_=1.1.1.1;1.0.0.1
      - DNSMASQ_LISTENING=all
      - FTLCONF_webserver_port=8053
    volumes:
      - ${CONFIG_ROOT}/pihole/etc-pihole:/etc/pihole
      - ${CONFIG_ROOT}/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # CLOUDFLARE BYPASS
  # ─────────────────────────────────────────────

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - "8191:8191"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # DOWNLOAD CLIENT
  # ─────────────────────────────────────────────

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${CONFIG_ROOT}/qbittorrent:/config
      - ${DATA_ROOT}/torrents:/data/torrents
    ports:
      - "8080:8080"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # INDEXER MANAGER
  # ─────────────────────────────────────────────

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # ARR STACK
  # ─────────────────────────────────────────────

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/sonarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - "8989:8989"
    restart: unless-stopped

  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-anime
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/sonarr-anime:/config   # separate config = separate database
      - ${DATA_ROOT}:/data                    # same /data root = hardlinks work
    ports:
      - "8990:8989"
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/radarr:/config
      - ${DATA_ROOT}:/data
    ports:
      - "7878:7878"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # SUBTITLE MANAGER
  # ─────────────────────────────────────────────

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_ROOT}/bazarr:/config
      - ${DATA_ROOT}/media:/data/media
    ports:
      - "6767:6767"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # MEDIA SERVER
  # ─────────────────────────────────────────────

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ${CONFIG_ROOT}/plex:/config
      - ${DATA_ROOT}/media:/data/media
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped
